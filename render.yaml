services:
  - type: web
    name: rcpi-waste-ai
    env: python
    plan: free
    buildCommand: "python -m pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "python -m uvicorn app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/health"
    envVars:
      - key: WASTE_DB_PATH
        value: "/tmp/waste_ai.db"
