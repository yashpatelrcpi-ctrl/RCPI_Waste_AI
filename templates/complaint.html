<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCPI Waste Complaint Registration</title>

<style>

body{
    font-family:Arial;
    background:#eef2f3;
}

.container{
    width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 15px lightgray;
}

h1{
    text-align:center;
    color:green;
}

label{
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid gray;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h1>RCPI Waste Complaint Registration</h1>

<form action="/complaints" method="POST">

<label>Citizen Name</label>
<input type="text" name="citizen_name" required>

<label>Mobile Number</label>
<input type="text" name="mobile" required>

<label>Ward Number</label>
<input type="text" name="ward" required>

<label>Location</label>
<input type="text" name="location" required>

<label>Waste Type</label>

<select name="waste_type" required>

<option value="">Select Waste Type</option>

<option value="Plastic">Plastic</option>

<option value="Paper">Paper</option>

<option value="Glass">Glass</option>

<option value="Metal">Metal</option>

<option value="Organic">Organic Waste</option>

<option value="E-Waste">E-Waste</option>

<option value="Biomedical">Biomedical Waste</option>

<option value="Construction">Construction Waste</option>

<option value="Mixed">Mixed Waste</option>

</select>

<label>Complaint Details</label>

<textarea
name="complaint"
rows="6"
required></textarea>

<button type="submit">

Submit Complaint

</button>

</form>

</div>

</body>
</html>
