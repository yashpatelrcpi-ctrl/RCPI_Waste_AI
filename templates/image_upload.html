<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Waste Image - RCPI Waste AI</title>
    <style>
        :root {
            color-scheme: light;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f5f7ff 0%, #eef2ff 100%);
            color: #243b53;
        }
        .container {
            max-width: 720px;
            margin: 48px auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
        }
        h1 {
            color: #4f46e5;
            margin-top: 0;
        }
        .upload-area {
            border: 2px dashed #818cf8;
            padding: 32px;
            text-align: center;
            border-radius: 12px;
            background: #f8faff;
            margin: 20px 0;
        }
        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .note {
            color: #64748b;
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Upload Waste Image for AI Detection</h1>
        <p>Upload a photo of the waste item to let the AI classify it and suggest the most suitable disposal path.</p>
        <form method="POST" enctype="multipart/form-data" action="/api/detect-waste">
            <div class="upload-area">
                <input type="file" name="image" accept="image/*" required>
            </div>
            <input type="number" name="latitude" placeholder="Latitude (optional)" step="0.0001">
            <input type="number" name="longitude" placeholder="Longitude (optional)" step="0.0001">
            <textarea name="description" placeholder="Describe the waste (optional)" style="height: 110px;"></textarea>
            <button type="submit">🚀 Detect Waste Category</button>
        </form>
        <p class="note">Tip: You can also use the dashboard action link to return here after the analysis.</p>
    </div>
</body>
</html>
